<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Data Sorting Engine</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            color: #1f2937;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header {
            margin-bottom: 25px;
        }

        h2 {
            color: #111827;
        }

        p.subtitle {
            color: #6b7280;
            font-size: 0.95rem;
        }

        /* Sorting Control Bar Layout */
        .control-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #f9fafb;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            border: 1px solid #e5e7eb;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4b5563;
        }

        select {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background-color: white;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: #2563eb;
        }

        /* Inventory Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background-color: #f3f4f6;
            color: #374151;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        .badge {
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>Product Inventory System</h2>
            <p class="subtitle">Simulated Client-Side API Sorting Pipeline</p>
        </header>

        <div class="control-bar">
            <div class="control-group">
                <label for="sortBy">Sort By Field</label>
                <select id="sortBy">
                    <option value="name">Product Name</option>
                    <option value="price">Price</option>
                    <option value="stock">Stock Quantity</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sortOrder">Direction</label>
                <select id="sortOrder">
                    <option value="asc">Ascending (A-Z / Low to High)</option>
                    <option value="desc">Descending (Z-A / High to Low)</option>
                </select>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Product Item</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock status</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                </tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
